<!DOCTYPE html>
<html>
<head>
  <title>Time Wasting Website.</title>
  <style>
    /* Define palette as CSS variables */
:root {
  --border1: #17C3B2;      /* turquoise */
  --border2: #F4A261;      /* orange */
  --border3: #FE6D73;      /* red/pink */
  --div-color: #FFCB77;    /* warm yellow */
  --bg-color: #264653;     /* dark blue */
}
    body {
      font-family:"Courier New", monospace; 
      font-size:20px;
      background-color:var(--bg-color);
    }
 
    .title {
      border:6px solid var(--border3);
      background-color:var(--div-color);
      text-align:center; 
    }
    .warning {
      color:red;
      font-weight:bold;
    }
 
      .ditto {
        position:fixed;
        left:520px;
        
      }
  </style>
</head>
<body>
  <div class="ditto">
  <img src="https://img.pokemondb.net/sprites/sword-shield/normal/ditto.png" alt="Ditto">
  </div>
    <div class="title">
  <h1>✨ Welcome to Time Wasting Website. ✨</h1>
  <p>A website just interesting enough to keep you here.</p>
  <p>Have fun exploring the true internet rabbit hole that this website is. 🙃</p>
  <p>Oh yeah, make sure to NOT click the ditto up there. He's keeping the div up.</p>
  <p class="warning">⚠️ Warning: Make sure to watch out for malware. ⚠️</p>
  </div>
  <script>
const ditto = document.querySelector('.ditto');

// Save initial position
let startTop = ditto.getBoundingClientRect().top;
let startLeft = ditto.getBoundingClientRect().left;

ditto.addEventListener('click', () => {
  let top = startTop;
  const fallDistance = window.innerHeight - 100;
  const fallSpeed = 4;

  // Swing variables
  let angle = 0;
  let swingSpeed = 0.1;
  let swingDirection = 1;

  // Create popup
  const popup = document.createElement('div');
  popup.textContent = "Hey! Look what you did :( Put him back!!";
  popup.style.position = 'fixed';
  popup.style.top = '35%';
  popup.style.left = '50%';
  popup.style.transform = 'translate(-50%, -50%)';
  popup.style.backgroundColor = '#FFCB77';
  popup.style.border = '4px solid #FE6D73';
  popup.style.padding = '20px';
  popup.style.fontFamily = '"Courier New", monospace';
  popup.style.fontSize = '20px';
  popup.style.textAlign = 'center';
  popup.style.cursor = 'pointer';
  popup.style.boxShadow = '0 8px 20px rgba(0,0,0,0.5)'; // subtle shadow to lift it
  popup.style.zIndex = 9999; // make sure it's on top
  document.body.appendChild(popup);

  function fallAndSwing() {
    if (top < fallDistance) {
      top += fallSpeed;
      ditto.style.top = top + 'px';

      // Swing side to side
      angle += swingSpeed * swingDirection;
      if (angle > 15 || angle < -15) swingDirection *= -1;
      ditto.style.transform = `rotate(${angle}deg)`;

      requestAnimationFrame(fallAndSwing);
    } else {
      ditto.style.top = fallDistance + 'px';
      ditto.style.transform = 'rotate(0deg)';
    }
  }

  fallAndSwing();

  // When popup clicked, reset Ditto
  popup.addEventListener('click', () => {
    ditto.style.top = startTop + 'px';
    ditto.style.left = startLeft + 'px';
    ditto.style.transform = 'rotate(0deg)';
    document.body.removeChild(popup);
  });
});
</script>
</body>
</html>
