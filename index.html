<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Time Wasting Website</title>
<style>
  body {
    font-family: "Courier New", monospace;
    text-align: center;
    padding-top: 50px;
    background-color: #f0f8ff;
    overflow-x: hidden;
    position: relative;
  }
  #countdown {
    font-size: 2em;
    margin-bottom: 30px;
    min-height: 60px;
  }
  #loadingBar {
    height: 20px;
    width: 80%;
    background-color: #ddd;
    margin: 0 auto 30px auto;
    border-radius: 10px;
    overflow: hidden;
  }
  #loadingFill {
    height: 100%;
    width: 0;
    background-color: #4caf50;
    transition: width 1s linear;
  }
  button {
    padding: 10px 20px;
    font-size: 1em;
    cursor: pointer;
    margin-top: 20px;
  }
  #adminPopup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: white;
    padding: 30px;
    border: 2px solid #333;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
    z-index: 1000;
  }
  #adminPopup input[type="password"] {
    padding: 10px;
    font-size: 1em;
    width: 200px;
  }
  #adminPopup button {
    margin-top: 10px;
    padding: 8px 15px;
    font-size: 1em;
  }
  #overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.5);
    z-index: 500;
  }
  .catMeme {
    position: absolute;
    width: 80px;
    animation: floatCat 15s linear infinite;
    z-index: 2000;
  }
  @keyframes floatCat {
    0% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-30px) rotate(15deg); }
    100% { transform: translateY(0px) rotate(0deg); }
  }
</style>
</head>
<body>

<h1>Time Wasting Website</h1>
<div id="countdown">Loading…</div>
<div id="loadingBar"><div id="loadingFill"></div></div>
<button onclick="showAdminPopup()">Construction Zone</button>

<div id="overlay"></div>

<div id="adminPopup">
  <h3>Contractors Only</h3>
  <input type="password" id="adminPassword" placeholder="Enter password">
  <br>
  <button onclick="checkAdminPassword()">Submit</button>
  <button onclick="closeAdminPopup()">Cancel</button>
</div>

<script>
  // ==== Countdown Timer ====
  const releaseDate = new Date("2026-06-30 12:30:00").getTime();

  // ==== Fun Messages ====
  const messages = [
    "Microwave popcorn in progress 🍿",
    "Polishing pixels… almost ready! ✨",
    "Charging up your time-wasting experience ⚡",
    "Mixing memes and code 😎",
    "Adjusting the flux capacitor 🚀",
    "Brewing virtual coffee ☕",
    "Counting invisible pixels 👻",
    "Summoning the internet gremlins 👾",
    "Sharpening digital pencils ✏️",
    "Warming up the hamster powering our server 🐹",
    "Calibrating nonsense generators 🤖",
    "Loading infinite fun… please wait 🎉",
    "Feeding the virtual cat 🐱",
    "Tickling the code elves 🧝‍♂️",
    "Dancing with CSS magic 💃",
    "Pretending I know what I'm doing 🤯",
    "Taking care of my Tamagotchi ✨",
    "Catching 'em all 🐦‍⬛🐅🐬"
  ];
  let msgIndex = 0;

  function updateCountdown() {
    const now = new Date().getTime();
    const distance = releaseDate - now;

    const countdownEl = document.getElementById("countdown");

    if (distance < 0) {
      countdownEl.textContent = "🎉 The website is live! 🎉";
      return;
    }

    const days = Math.floor(distance / (1000*60*60*24));
    const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((distance % (1000*60)) / 1000);

    const countdownText = `⏳ Launch in: ${days}d ${hours}h ${minutes}m ${seconds}s`;
    countdownEl.textContent = countdownText + " — " + messages[msgIndex];
  }

  setInterval(updateCountdown, 1000);

  // Update message every minute
  function updateMessage() {
    msgIndex = (msgIndex + 1) % messages.length;
  }
  setInterval(updateMessage, 60000);

  // ==== Loading bar animation ====
  let fillWidth = 0;
  function animateLoadingBar() {
    fillWidth += 1;
    if (fillWidth > 100) fillWidth = 0;
    document.getElementById("loadingFill").style.width = fillWidth + "%";
  }
  setInterval(animateLoadingBar, 600);

  // ==== Admin Popup Functions ====
  function showAdminPopup() {
    document.getElementById('adminPopup').style.display = 'block';
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('adminPassword').focus();
  }
  function closeAdminPopup() {
    document.getElementById('adminPopup').style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('adminPassword').value = '';
  }
  function checkAdminPassword() {
    const password = document.getElementById('adminPassword').value;
    const correctPassword = "EnterIfYouDare";
    if (password === correctPassword) {
      window.location.href = "homepage.html";
    } else {
      alert("Wrong password!");
    }
  }
  document.getElementById('overlay').onclick = closeAdminPopup;

  // ==== Cat Memes ====
  const catImages = [
    "https://cataas.com/cat/cute/says/Meow",
    "https://cataas.com/cat/cute/says/Hi",
    "https://cataas.com/cat/cute/says/Nap",
    "https://cataas.com/cat/cute/says/LOL"
  ];

  function spawnCatMeme() {
    const img = document.createElement("img");
    img.src = catImages[Math.floor(Math.random()*catImages.length)];
    img.className = "catMeme";
    img.style.top = Math.random()*80 + "%";
    img.style.left = Math.random()*90 + "%";
    document.body.appendChild(img);
    setTimeout(() => { img.remove(); }, 10000);
  }
  setInterval(spawnCatMeme, 15000);

  // Initial call to show countdown immediately
  updateCountdown();
</script>

</body>
</html>
