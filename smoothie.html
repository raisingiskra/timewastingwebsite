<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ditto's Smoothie Maker</title>
<link rel="icon" type="image/x-icon" href="favicon.png">
<style>
  :root {
    --border1: #17C3B2;
    --border2: #F4A261;
    --border3: #FE6D73;
    --div-color: #FFCB77;
    --bg-color: #264653;
  }

  body {
    font-family: "Courier New", monospace;
    background-color: var(--bg-color);
    color: #FFF;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
  }

  h1 {
    text-align: center;
    padding: 20px;
    background-color: var(--div-color);
    border: 6px solid var(--border3);
    margin: 0;
  }

  #ingredientsRow {
    position: fixed;
    bottom: 100px;
    left: 0;
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 5px 0;
    gap: 5px;
    overflow-x: auto;
    white-space: nowrap;
    z-index: 1000;
    background-color: var(--bg-color);
    border-top: 4px solid var(--border2);
    border-bottom: 4px solid var(--border2);
  }

  #ingredientsRow button {
    background: var(--div-color);
    border: 2px solid var(--border3);
    border-radius: 8px;
    padding: 5px 10px;
    font-family: "Courier New", monospace;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
    color: #000;
  }

  #ingredientsRow button:hover {
    transform: scale(1.1);
    background: var(--border2);
  }

  #blendButton {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 30px;
    font-size: 20px;
    background: var(--border1);
    border: 2px solid var(--border3);
    border-radius: 10px;
    cursor: pointer;
    z-index: 1000;
    color: #000;
  }

  #blendButton:hover { background: var(--border2); }

  #result {
    margin-top: 30px;
    font-size: 22px;
    text-align: center;
  }

  #ditto {
    width: 300px;
    position: fixed;
    bottom: 300px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2000;
  }

  /* only spins when .blending is added */
  #ditto.blending {
    animation-name: spinDitto;
    animation-duration: 2s;
    animation-iteration-count: 5; /* spins 5 times */
    animation-timing-function: linear;
  }

  @keyframes spinDitto {
    0%   { transform: translateX(-50%) rotate(0deg); }
    100% { transform: translateX(-50%) rotate(360deg); }
  }

  .flyingIngredient {
    position: absolute;
    padding: 10px 20px;
    background: var(--div-color);
    border: 2px solid var(--border3);
    border-radius: 8px;
    font-family: "Courier New", monospace;
    color: #000;
    pointer-events: none;
    z-index: 1999;
  }
</style>
</head>
<body>
<h1>🍹 Ditto's Smoothie Maker 🍹</h1>

<div id="ingredientsRow"></div>
<button id="blendButton">Blend it! 🌀</button>
<div id="result"></div>
<img id="ditto" src="https://img.pokemondb.net/sprites/sword-shield/normal/ditto.png" alt="Ditto">

<script>
const ingredientList = [
  {name:"bacon", chaos:0, yummy:10, normal:0},
  {name:"fruits", chaos:0, yummy:0, normal:10},
  {name:"cheese", chaos:0, yummy:5, normal:5},
  {name:"a ditto", chaos:5, yummy:0, normal:5},
  {name:"sandwich", chaos:0, yummy:5, normal:5},
  {name:"someone’s water bottle", chaos:10, yummy:0, normal:0},
  {name:"turtle", chaos:10, yummy:0, normal:0},
  {name:"pants", chaos:10, yummy:0, normal:0},
  {name:"car tire", chaos:10, yummy:0, normal:0},
  {name:"coconut milk", chaos:0, yummy:0, normal:10},
  {name:"pudding", chaos:0, yummy:5, normal:5},
  {name:"vanilla extract", chaos:0, yummy:5, normal:5},
  {name:"cream", chaos:0, yummy:5, normal:5},
  {name:"broccoli", chaos:0, yummy:0, normal:10},
  {name:"eggs", chaos:0, yummy:5, normal:5},
  {name:"water", chaos:0, yummy:0, normal:10},
  {name:"clouds", chaos:10, yummy:0, normal:0},
  {name:"jewels", chaos:10, yummy:0, normal:0},
  {name:"stone", chaos:10, yummy:0, normal:0},
  {name:"spoon", chaos:5, yummy:0, normal:5},
  {name:"chocolate", chaos:0, yummy:10, normal:0},
  {name:"coffee", chaos:0, yummy:5, normal:5},
  {name:"lava", chaos:10, yummy:0, normal:0},
  {name:"rainbow", chaos:5, yummy:0, normal:5}
];
const ingredientsRow = document.getElementById('ingredientsRow');
const blendButton = document.getElementById('blendButton');
const resultDiv = document.getElementById('result');
const dittoImg = document.getElementById('ditto');

let selectedIngredients = [];

// Create ingredient buttons
ingredientList.forEach(item => {
  const btn = document.createElement('button');
  btn.textContent = item.name;
  ingredientsRow.appendChild(btn);

  btn.addEventListener('click', () => {
    selectedIngredients.push(item);

    // Fly animation
    const flyDiv = document.createElement('div');
    flyDiv.className = 'flyingIngredient';
    flyDiv.textContent = item.name;
    const rect = btn.getBoundingClientRect();
    flyDiv.style.left = rect.left + 'px';
    flyDiv.style.top = rect.top + 'px';
    document.body.appendChild(flyDiv);

    setTimeout(() => {
      const dittoRect = dittoImg.getBoundingClientRect();
      flyDiv.style.transition = 'all 1.5s ease-in';
      flyDiv.style.left = dittoRect.left + dittoRect.width/2 + 'px';
      flyDiv.style.top = dittoRect.top + dittoRect.height/2 + 'px';
      flyDiv.style.transform = 'translateX(-50%) scale(0.5)';
    }, 50);

    setTimeout(() => document.body.removeChild(flyDiv), 1600);
  });
});

// Blend button
blendButton.addEventListener('click', () => {
  if(selectedIngredients.length === 0){
    resultDiv.textContent = "Ditto says: Pick something first! 😅";
    return;
  }

  dittoImg.classList.add('blending'); // start spinning

  setTimeout(() => {
    dittoImg.classList.remove('blending'); // stop after 5 spins

    // Score calculation
    let chaos=0, yummy=0, normal=0;
    selectedIngredients.forEach(i=>{ chaos+=i.chaos; yummy+=i.yummy; normal+=i.normal; });

    let total=chaos+yummy+normal;
    let chaosPercent=(chaos/total)*100;
    let yummyPercent=(yummy/total)*100;
    let normalPercent=(normal/total)*100;

    let message="";
    if(chaosPercent>50) message="😱 Ditto says: This is too crazy!";
    else if(yummyPercent>=50) message="😋 Ditto says: Weird but tasty!";
    else if(normalPercent>=50) message="😎 Ditto says: Perfectly delicious!";
    else message="😏 Ditto says: Huh, what even is this?";

    const smoothie = selectedIngredients.map(i=>i.name).join(" + ");
    resultDiv.innerHTML=`✨ Your smoothie: ${smoothie} ✨<br>${message}<br>💥 Chaos:${chaos}, 🍴 Yummy:${yummy}, 🍓 Normal:${normal}`;

    selectedIngredients = [];
  }, 2*5*1000); // 2s * 5 spins = 10s
});
</script>
</body>
</html>
